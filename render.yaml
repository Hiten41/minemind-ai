services:
  - type: web
    name: minemind-api
    runtime: python
    rootDir: minemind/backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: FRONTEND_ORIGIN_REGEX
        value: ^https://.*\.vercel\.app$
      - key: FRONTEND_ORIGINS
        value: https://minemind-ai-steel.vercel.app
      - key: AUTH_SECRET
        generateValue: true
      - key: MINEMIND_STORAGE_DIR
        value: /tmp/minemind
      - key: LLM_PROVIDER
        value: groq
      - key: LLM_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_KEY
        sync: false
      - key: COGNEE_BASE_URL
        sync: false
      - key: COGNEE_API_KEY
        sync: false
      - key: COGNEE_SKIP_CONNECTION_TEST
        value: "true"
      - key: COGNEE_VECTOR_DB_PROVIDER
        value: lancedb
      - key: COGNEE_GRAPH_DB_PROVIDER
        value: kuzu
      - key: EMBEDDING_PROVIDER
        value: ollama
      - key: EMBEDDING_MODEL
        value: nomic-embed-text
      - key: EMBEDDING_ENDPOINT
        value: http://localhost:11434/api/embed
      - key: EMBEDDING_DIMENSIONS
        value: "768"
